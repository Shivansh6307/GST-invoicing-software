<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GST Invoice</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #eef2f7;
            color: #333;
            line-height: 1.6;
        }

        .invoice-container {
            max-width: 900px;
            margin: 30px auto;
            background: #fff;
            border-radius: 6px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }

        /* ── Header ── */
        .invoice-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1a5276;
            color: #fff;
            padding: 24px 32px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .company-logo {
            width: 64px;
            height: 64px;
            background: #fff;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1a5276;
            font-size: 11px;
            font-weight: 600;
            text-align: center;
        }

        .header-title {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .header-right {
            text-align: right;
        }

        .header-right .field-group {
            margin-bottom: 6px;
        }

        .header-right .field-group:last-child {
            margin-bottom: 0;
        }

        .header-right label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.85;
            margin-right: 6px;
        }

        .header-right input[type="text"],
        .header-right input[type="date"] {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 4px;
            color: #fff;
            padding: 4px 10px;
            font-size: 14px;
            width: 160px;
        }

        .header-right input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .header-right input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
        }

        /* ── Body ── */
        .invoice-body {
            padding: 28px 32px;
        }

        /* ── Sections ── */
        section {
            margin-bottom: 28px;
        }

        h2 {
            font-size: 16px;
            font-weight: 600;
            color: #1a5276;
            border-bottom: 2px solid #d4e6f1;
            padding-bottom: 6px;
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px 24px;
        }

        .form-field {
            display: flex;
            flex-direction: column;
        }

        .form-field label {
            font-size: 12px;
            font-weight: 600;
            color: #5d6d7e;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin-bottom: 4px;
        }

        .form-field input,
        .form-field select {
            border: 1px solid #d4e6f1;
            border-radius: 4px;
            padding: 8px 10px;
            font-size: 14px;
            color: #333;
            transition: border-color 0.2s;
        }

        .form-field input:focus,
        .form-field select:focus {
            outline: none;
            border-color: #2980b9;
            box-shadow: 0 0 0 2px rgba(41, 128, 185, 0.15);
        }

        /* ── Details row (seller + client side by side) ── */
        .details-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 28px;
            margin-bottom: 28px;
        }

        .details-row section {
            margin-bottom: 0;
        }

        /* ── Table ── */
        #line-items-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        #line-items-table thead {
            background: #1a5276;
            color: #fff;
        }

        #line-items-table th {
            padding: 10px 8px;
            text-align: left;
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        #line-items-table td {
            padding: 6px 4px;
            border-bottom: 1px solid #eaecee;
        }

        #line-items-table tbody tr:hover {
            background: #f4f8fb;
        }

        #line-items-table input,
        #line-items-table select {
            width: 100%;
            border: 1px solid #d4e6f1;
            border-radius: 4px;
            padding: 6px 8px;
            font-size: 13px;
            color: #333;
        }

        #line-items-table input:focus,
        #line-items-table select:focus {
            outline: none;
            border-color: #2980b9;
        }

        #line-items-table input[readonly] {
            background: #f7f9fb;
            color: #5d6d7e;
        }

        /* ── Buttons ── */
        .remove-row-btn {
            background: #e74c3c;
            color: #fff;
            border: none;
            border-radius: 4px;
            padding: 6px 12px;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .remove-row-btn:hover {
            background: #c0392b;
        }

        #add-row-btn {
            margin-top: 12px;
            background: #2980b9;
            color: #fff;
            border: none;
            border-radius: 4px;
            padding: 8px 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        #add-row-btn:hover {
            background: #1a6fa0;
        }

        #download-invoice-btn {
            margin-top: 20px;
            background: #27ae60;
            color: #fff;
            border: none;
            border-radius: 4px;
            padding: 10px 28px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        #download-invoice-btn:hover {
            background: #1e8449;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
    <div class="invoice-container">

        <!-- Header: logo placeholder + invoice number/date -->
        <div class="invoice-header">
            <div class="header-left">
                <div class="company-logo">Your Logo</div>
                <span class="header-title">GST Invoice</span>
            </div>
            <div class="header-right">
                <div class="field-group">
                    <label for="invoice-number">Invoice #</label>
                    <input type="text" id="invoice-number" name="invoice-number" placeholder="INV-001">
                </div>
                <div class="field-group">
                    <label for="invoice-date">Date</label>
                    <input type="date" id="invoice-date" name="invoice-date">
                </div>
            </div>
        </div>

        <div class="invoice-body">

            <!-- Seller & Client side by side -->
            <div class="details-row">
                <section>
                    <h2>Seller Details</h2>
                    <div class="form-grid">
                        <div class="form-field">
                            <label for="seller-name">Business Name</label>
                            <input type="text" id="seller-name" name="seller-name">
                        </div>
                        <div class="form-field">
                            <label for="seller-gstin">GSTIN</label>
                            <input type="text" id="seller-gstin" name="seller-gstin" maxlength="15">
                        </div>
                        <div class="form-field">
                            <label for="seller-address">Address</label>
                            <input type="text" id="seller-address" name="seller-address">
                        </div>
                        <div class="form-field">
                            <label for="seller-city">City</label>
                            <input type="text" id="seller-city" name="seller-city">
                        </div>
                        <div class="form-field">
                            <label for="seller-state">State</label>
                            <input type="text" id="seller-state" name="seller-state">
                        </div>
                        <div class="form-field">
                            <label for="seller-pincode">PIN Code</label>
                            <input type="text" id="seller-pincode" name="seller-pincode" pattern="[0-9]{6}" maxlength="6">
                        </div>
                        <div class="form-field">
                            <label for="seller-phone">Phone</label>
                            <input type="tel" id="seller-phone" name="seller-phone">
                        </div>
                        <div class="form-field">
                            <label for="seller-email">Email</label>
                            <input type="email" id="seller-email" name="seller-email">
                        </div>
                    </div>
                </section>

                <section>
                    <h2>Client Details</h2>
                    <div class="form-grid">
                        <div class="form-field">
                            <label for="client-name">Client Name</label>
                            <input type="text" id="client-name" name="client-name">
                        </div>
                        <div class="form-field">
                            <label for="client-gstin">GSTIN</label>
                            <input type="text" id="client-gstin" name="client-gstin" maxlength="15">
                        </div>
                        <div class="form-field">
                            <label for="client-address">Address</label>
                            <input type="text" id="client-address" name="client-address">
                        </div>
                        <div class="form-field">
                            <label for="client-city">City</label>
                            <input type="text" id="client-city" name="client-city">
                        </div>
                        <div class="form-field">
                            <label for="client-state">State</label>
                            <input type="text" id="client-state" name="client-state">
                        </div>
                        <div class="form-field">
                            <label for="client-pincode">PIN Code</label>
                            <input type="text" id="client-pincode" name="client-pincode" pattern="[0-9]{6}" maxlength="6">
                        </div>
                        <div class="form-field">
                            <label for="client-phone">Phone</label>
                            <input type="tel" id="client-phone" name="client-phone">
                        </div>
                        <div class="form-field">
                            <label for="client-email">Email</label>
                            <input type="email" id="client-email" name="client-email">
                        </div>
                    </div>
                </section>
            </div>

            <section>
                <h2>Line Items</h2>
                <table id="line-items-table">
                    <thead>
                        <tr>
                            <th>Description</th>
                            <th>HSN/SAC</th>
                            <th>Qty</th>
                            <th>Unit</th>
                            <th>Rate (₹)</th>
                            <th>Amount (₹)</th>
                            <th>GST %</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="line-items-body">
                        <tr>
                            <td><input type="text" name="item-description"></td>
                            <td><input type="text" name="item-hsn"></td>
                            <td><input type="number" name="item-quantity" min="0"></td>
                            <td><input type="text" name="item-unit"></td>
                            <td><input type="number" name="item-rate" min="0" step="0.01"></td>
                            <td><input type="number" name="item-amount" min="0" step="0.01" readonly></td>
                            <td>
                                <select name="item-gst-rate">
                                    <option value="0">0%</option>
                                    <option value="5">5%</option>
                                    <option value="12">12%</option>
                                    <option value="18" selected>18%</option>
                                    <option value="28">28%</option>
                                </select>
                            </td>
                            <td><button type="button" class="remove-row-btn">Remove Row</button></td>
                        </tr>
                    </tbody>
                </table>
                <button type="button" id="add-row-btn">+ Add Row</button>
            </section>

            <div style="text-align: center; margin-top: 8px;">
                <button type="button" id="download-invoice-btn">Download Invoice</button>
            </div>

        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            var tbody = document.getElementById('line-items-body');
            var addRowBtn = document.getElementById('add-row-btn');

            function calculateAmount(row) {
                var quantity = parseFloat(row.querySelector('[name="item-quantity"]').value) || 0;
                var rate = parseFloat(row.querySelector('[name="item-rate"]').value) || 0;
                row.querySelector('[name="item-amount"]').value = (quantity * rate).toFixed(2);
            }

            function attachRowListeners(row) {
                row.querySelector('[name="item-quantity"]').addEventListener('input', function () {
                    calculateAmount(row);
                });
                row.querySelector('[name="item-rate"]').addEventListener('input', function () {
                    calculateAmount(row);
                });
                row.querySelector('.remove-row-btn').addEventListener('click', function () {
                    if (tbody.rows.length > 1) {
                        row.remove();
                    }
                });
            }

            // Attach listeners to the initial row
            attachRowListeners(tbody.rows[0]);

            addRowBtn.addEventListener('click', function () {
                var newRow = tbody.rows[0].cloneNode(true);
                var inputs = newRow.querySelectorAll('input');
                for (var i = 0; i < inputs.length; i++) {
                    inputs[i].value = '';
                }
                var selects = newRow.querySelectorAll('select');
                for (var j = 0; j < selects.length; j++) {
                    selects[j].selectedIndex = 3; // Default to 18%
                }
                attachRowListeners(newRow);
                tbody.appendChild(newRow);
            });

            // Download Invoice as PDF
            document.getElementById('download-invoice-btn').addEventListener('click', function () {
                var invoiceNumber = document.getElementById('invoice-number').value || 'N/A';
                var invoiceDate = document.getElementById('invoice-date').value || new Date().toISOString().split('T')[0];

                var sellerName = document.getElementById('seller-name').value || '';
                var sellerGSTIN = document.getElementById('seller-gstin').value || '';
                var sellerAddress = document.getElementById('seller-address').value || '';
                var sellerCity = document.getElementById('seller-city').value || '';
                var sellerState = document.getElementById('seller-state').value || '';
                var sellerPincode = document.getElementById('seller-pincode').value || '';
                var sellerPhone = document.getElementById('seller-phone').value || '';
                var sellerEmail = document.getElementById('seller-email').value || '';

                var clientName = document.getElementById('client-name').value || '';
                var clientGSTIN = document.getElementById('client-gstin').value || '';
                var clientAddress = document.getElementById('client-address').value || '';
                var clientCity = document.getElementById('client-city').value || '';
                var clientState = document.getElementById('client-state').value || '';
                var clientPincode = document.getElementById('client-pincode').value || '';
                var clientPhone = document.getElementById('client-phone').value || '';
                var clientEmail = document.getElementById('client-email').value || '';

                var rows = document.querySelectorAll('#line-items-body tr');
                var itemsHTML = '';
                var subtotal = 0;
                var totalGST = 0;

                rows.forEach(function (row, index) {
                    var description = row.querySelector('[name="item-description"]').value || '';
                    var hsn = row.querySelector('[name="item-hsn"]').value || '';
                    var qty = parseFloat(row.querySelector('[name="item-quantity"]').value) || 0;
                    var unit = row.querySelector('[name="item-unit"]').value || '';
                    var rate = parseFloat(row.querySelector('[name="item-rate"]').value) || 0;
                    var amount = qty * rate;
                    var gstRate = parseFloat(row.querySelector('[name="item-gst-rate"]').value) || 0;
                    var gstAmount = amount * (gstRate / 100);

                    subtotal += amount;
                    totalGST += gstAmount;

                    itemsHTML += '<tr>' +
                        '<td style="padding:8px 6px;border-bottom:1px solid #ddd;text-align:center;">' + (index + 1) + '</td>' +
                        '<td style="padding:8px 6px;border-bottom:1px solid #ddd;">' + description + '</td>' +
                        '<td style="padding:8px 6px;border-bottom:1px solid #ddd;text-align:center;">' + hsn + '</td>' +
                        '<td style="padding:8px 6px;border-bottom:1px solid #ddd;text-align:center;">' + qty + '</td>' +
                        '<td style="padding:8px 6px;border-bottom:1px solid #ddd;text-align:center;">' + unit + '</td>' +
                        '<td style="padding:8px 6px;border-bottom:1px solid #ddd;text-align:right;">\u20B9' + rate.toFixed(2) + '</td>' +
                        '<td style="padding:8px 6px;border-bottom:1px solid #ddd;text-align:right;">\u20B9' + amount.toFixed(2) + '</td>' +
                        '<td style="padding:8px 6px;border-bottom:1px solid #ddd;text-align:center;">' + gstRate + '%</td>' +
                        '<td style="padding:8px 6px;border-bottom:1px solid #ddd;text-align:right;">\u20B9' + gstAmount.toFixed(2) + '</td>' +
                        '<td style="padding:8px 6px;border-bottom:1px solid #ddd;text-align:right;font-weight:600;">\u20B9' + (amount + gstAmount).toFixed(2) + '</td>' +
                        '</tr>';
                });

                var grandTotal = subtotal + totalGST;

                var sellerLocation = [sellerCity, sellerState, sellerPincode].filter(Boolean).join(', ');
                var clientLocation = [clientCity, clientState, clientPincode].filter(Boolean).join(', ');

                var html = '<div style="width:760px;background:#fff;font-family:Arial,Helvetica,sans-serif;color:#333;">' +
                    '<table style="width:100%;background:#1a5276;color:#fff;border-collapse:collapse;">' +
                    '<tr><td style="padding:24px 30px;font-size:24px;font-weight:700;">GST INVOICE</td>' +
                    '<td style="padding:24px 30px;text-align:right;font-size:13px;">' +
                    '<div><strong>Invoice #:</strong> ' + invoiceNumber + '</div>' +
                    '<div style="margin-top:4px;"><strong>Date:</strong> ' + invoiceDate + '</div>' +
                    '</td></tr></table>' +

                    '<table style="width:100%;background:#f8f9fa;border-collapse:collapse;">' +
                    '<tr><td style="width:50%;padding:20px 30px;vertical-align:top;">' +
                    '<div style="font-size:12px;font-weight:700;color:#1a5276;text-transform:uppercase;border-bottom:2px solid #1a5276;padding-bottom:4px;margin-bottom:8px;">Seller Details</div>' +
                    '<div style="font-size:13px;line-height:1.8;">' +
                    (sellerName ? '<div><strong>' + sellerName + '</strong></div>' : '') +
                    (sellerGSTIN ? '<div>GSTIN: ' + sellerGSTIN + '</div>' : '') +
                    (sellerAddress ? '<div>' + sellerAddress + '</div>' : '') +
                    (sellerLocation ? '<div>' + sellerLocation + '</div>' : '') +
                    (sellerPhone ? '<div>Phone: ' + sellerPhone + '</div>' : '') +
                    (sellerEmail ? '<div>Email: ' + sellerEmail + '</div>' : '') +
                    '</div></td>' +
                    '<td style="width:50%;padding:20px 30px;vertical-align:top;">' +
                    '<div style="font-size:12px;font-weight:700;color:#1a5276;text-transform:uppercase;border-bottom:2px solid #1a5276;padding-bottom:4px;margin-bottom:8px;">Client Details</div>' +
                    '<div style="font-size:13px;line-height:1.8;">' +
                    (clientName ? '<div><strong>' + clientName + '</strong></div>' : '') +
                    (clientGSTIN ? '<div>GSTIN: ' + clientGSTIN + '</div>' : '') +
                    (clientAddress ? '<div>' + clientAddress + '</div>' : '') +
                    (clientLocation ? '<div>' + clientLocation + '</div>' : '') +
                    (clientPhone ? '<div>Phone: ' + clientPhone + '</div>' : '') +
                    (clientEmail ? '<div>Email: ' + clientEmail + '</div>' : '') +
                    '</div></td></tr></table>' +

                    '<div style="padding:20px 30px;">' +
                    '<table style="width:100%;border-collapse:collapse;font-size:12px;">' +
                    '<thead><tr style="background:#1a5276;color:#fff;">' +
                    '<th style="padding:10px 6px;text-align:center;">#</th>' +
                    '<th style="padding:10px 6px;text-align:left;">Description</th>' +
                    '<th style="padding:10px 6px;text-align:center;">HSN/SAC</th>' +
                    '<th style="padding:10px 6px;text-align:center;">Qty</th>' +
                    '<th style="padding:10px 6px;text-align:center;">Unit</th>' +
                    '<th style="padding:10px 6px;text-align:right;">Rate (\u20B9)</th>' +
                    '<th style="padding:10px 6px;text-align:right;">Amount (\u20B9)</th>' +
                    '<th style="padding:10px 6px;text-align:center;">GST %</th>' +
                    '<th style="padding:10px 6px;text-align:right;">GST Amt (\u20B9)</th>' +
                    '<th style="padding:10px 6px;text-align:right;">Total (\u20B9)</th>' +
                    '</tr></thead>' +
                    '<tbody>' + itemsHTML + '</tbody></table>' +

                    '<table style="width:280px;margin-left:auto;margin-top:16px;font-size:13px;border-collapse:collapse;">' +
                    '<tr><td style="padding:6px 10px;">Subtotal:</td><td style="padding:6px 10px;text-align:right;">\u20B9' + subtotal.toFixed(2) + '</td></tr>' +
                    '<tr><td style="padding:6px 10px;">Total GST:</td><td style="padding:6px 10px;text-align:right;">\u20B9' + totalGST.toFixed(2) + '</td></tr>' +
                    '<tr style="font-weight:700;font-size:15px;border-top:2px solid #1a5276;">' +
                    '<td style="padding:10px;">Grand Total:</td><td style="padding:10px;text-align:right;">\u20B9' + grandTotal.toFixed(2) + '</td></tr>' +
                    '</table></div>' +

                    '<div style="background:#f8f9fa;padding:16px 30px;text-align:center;font-size:11px;color:#777;border-top:1px solid #ddd;">' +
                    'This is a computer-generated invoice.</div>' +
                    '</div>';

                var container = document.createElement('div');
                container.style.position = 'absolute';
                container.style.left = '-9999px';
                container.style.top = '0';
                container.innerHTML = html;
                document.body.appendChild(container);

                html2canvas(container.firstChild, { scale: 2, useCORS: true }).then(function (canvas) {
                    var imgData = canvas.toDataURL('image/png');
                    var pdf = new jspdf.jsPDF('p', 'mm', 'a4');
                    var pageWidth = pdf.internal.pageSize.getWidth();
                    var pageHeight = pdf.internal.pageSize.getHeight();
                    var imgWidth = pageWidth - 20;
                    var imgHeight = (canvas.height * imgWidth) / canvas.width;
                    var heightLeft = imgHeight;
                    var position = 10;

                    pdf.addImage(imgData, 'PNG', 10, position, imgWidth, imgHeight);
                    heightLeft -= (pageHeight - 20);

                    while (heightLeft > 0) {
                        pdf.addPage();
                        position = 10 - (imgHeight - heightLeft);
                        pdf.addImage(imgData, 'PNG', 10, position, imgWidth, imgHeight);
                        heightLeft -= (pageHeight - 20);
                    }

                    pdf.save('Invoice-' + invoiceNumber + '.pdf');
                    document.body.removeChild(container);
                });
            });
        });
    </script>
</body>
</html>
